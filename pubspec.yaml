name: shoppy
description: A smart shopping assistant.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.0

  google_fonts: ^6.3.2
  fl_chart: ^0.71.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  speech_to_text: ^7.0.0
  image_picker: ^1.2.0

  http: ^1.5.0
  flutter_dotenv: ^5.2.1
  google_generative_ai: ^0.4.7

  geolocator: ^13.0.4
  geocoding: ^3.0.0

  intl: ^0.20.2
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - .env
